# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name sanctissimissa-app.robin.mba;
    return 301 https://$host$request_uri;
}

# HTTPS — public SPA
server {
    listen 443 ssl;
    server_name sanctissimissa-app.robin.mba;
    ssl_certificate     /etc/nginx/ssl/fullchain1/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/fullchain1/private.key;

    root  /var/www/sanctissimissa-app/current;
    index index.html;

    location /api/ {
        proxy_pass         http://127.0.0.1:9837/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.wasm$ {
        default_type application/wasm;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(db|sqlite|sqlite3)$ {
        default_type application/octet-stream;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.txt$ {
        default_type text/plain;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    add_header Access-Control-Allow-Origin "*" always;
}

# Local port — nginx-ui internal routing
