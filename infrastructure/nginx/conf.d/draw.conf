server {
    listen 80;
    server_name draw.robin.mba;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name draw.robin.mba;
    ssl_certificate     /etc/nginx/ssl/fullchain1/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/fullchain1/private.key;
    # TODO: verify upstream IP — plan listed 192.168.0.105, note said CT122 on .31

    location / {
        proxy_pass  http://192.168.0.105:3000;
        include     /etc/nginx/snippets/proxy-params.conf;
    }
}
