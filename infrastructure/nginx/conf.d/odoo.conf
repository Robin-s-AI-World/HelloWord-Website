server {
    listen 80;
    server_name www.robin.mba odoo.robin.mba odoo.rochemediaservices.xyz www.rochemediaservices.xyz odoo.robins.courses www.robins.courses;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name www.robin.mba odoo.robin.mba odoo.rochemediaservices.xyz www.rochemediaservices.xyz odoo.robins.courses www.robins.courses;
    ssl_certificate     /etc/nginx/ssl/fullchain1/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/fullchain1/private.key;
    # NOTE: *.robins.courses not in SAN - browser cert warning for that subdomain until provisioned

    location / {
        proxy_pass  http://192.168.0.175:8069;
        include     /etc/nginx/snippets/proxy-params.conf;
    }
}
