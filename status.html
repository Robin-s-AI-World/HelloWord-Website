<!DOCTYPE html>
<html>
<head>
    <title>CI/CD Status — SanctissiMissa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F5F0E8; font-family: sans-serif; }
        .card { background: white; padding: 1.5rem; border-radius: 0.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        .status-success { color: green; font-weight: bold; }
        .status-failure { color: red; font-weight: bold; }
        .status-in_progress { color: blue; font-weight: bold; }
    </style>
</head>
<body class="p-8">
    <h1 class="text-3xl font-bold mb-8">SanctissiMissa CI/CD Pipeline</h1>
    <div id="workflows">
        <p>Loading real-time status from GitHub...</p>
    </div>

    <script>
        const owner = 'Robin-s-AI-World';
        const repo = 'HelloWord';
        
        async function fetchStatus() {
            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs?per_page=10`);
                const data = await response.json();
                const container = document.getElementById('workflows');
                container.innerHTML = '';

                data.workflow_runs.forEach(run => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="flex justify-between">
                            <h3 class="text-lg font-bold">${run.name}</h3>
                            <span class="status-${run.status} status-${run.conclusion}">${(run.conclusion || run.status).toUpperCase()}</span>
                        </div>
                        <p class="text-sm text-gray-600">Branch: ${run.head_branch} | Commit: ${run.head_sha.substring(0,7)}</p>
                        <p class="text-xs text-gray-400">Started: ${new Date(run.created_at).toLocaleString()}</p>
                        <a href="${run.html_url}" target="_blank" class="text-blue-500 text-xs hover:underline">View on GitHub</a>
                    
`;
                    container.appendChild(div);
                });
            } catch (e) {
                document.getElementById('workflows').innerHTML = '<p class="text-red-500">Error fetching status. Is the repo public?</p>';
            }
        }

        fetchStatus();
        setInterval(fetchStatus, 30000); // Update every 30 seconds
    </script>
</body>
</html>
